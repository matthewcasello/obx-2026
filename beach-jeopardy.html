<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js">
// ================= PHONE BUZZERS (PeerJS) =================
const BUZZ_JOIN = new URLSearchParams(location.search).get('buzz');
let hostPeer = null, buzzConns = [], buzzArmed = false, buzzWinner = null;

function toggleBuzzSetup(){
  const el = document.getElementById('buzzSetup');
  const opening = !el.classList.contains('active');
  el.classList.toggle('active');
  if(opening && !hostPeer) startHostPeer();
}

function shortId(){
  const c = 'abcdefghjkmnpqrstuvwxyz23456789';
  let s = 'bj';
  for(let i=0;i<5;i++) s += c[Math.floor(Math.random()*c.length)];
  return s;
}

function startHostPeer(){
  const id = shortId();
  hostPeer = new Peer(id);
  hostPeer.on('open', ()=>{
    const url = location.origin + location.pathname + '?buzz=' + id;
    document.getElementById('buzzUrl').textContent = url;
    new QRCode(document.getElementById('qrCode'), {text:url, width:200, height:200});
  });
  hostPeer.on('connection', conn=>{
    // PeerJS race: incoming connections can already be open before the
    // 'open' handler attaches, so send hello both ways and on request.
    const sendHello = ()=>{ try{ conn.send({type:'hello', teams: teams.map(t=>t.name)}); }catch(e){} };
    if(conn.open){ sendHello(); } else { conn.on('open', sendHello); }
    setTimeout(sendHello, 800);  // belt and suspenders
    conn.on('data', d=>{
      if(d.type === 'hi'){ sendHello(); }
      if(d.type === 'join'){
        conn._pname = d.name; conn._pteam = d.team;
        buzzConns.push(conn);
        renderPlayerList();
        conn.send({type: buzzArmed ? 'arm' : 'reset'});
      }
      if(d.type === 'buzz' && buzzArmed && !buzzWinner){
        buzzWinner = {name: conn._pname, team: conn._pteam};
        buzzArmed = false;
        const b = document.getElementById('buzzBanner');
        b.textContent = '🔔 ' + buzzWinner.name + ' — ' + buzzWinner.team;
        b.classList.add('on');
        beep(1200,.15,0); beep(1500,.25,.15);
        broadcast({type:'lock', winnerName: buzzWinner.name});
        document.getElementById('rearmBtn').style.display = '';
      }
    });
    conn.on('close', ()=>{
      buzzConns = buzzConns.filter(c=>c!==conn);
      renderPlayerList();
    });
  });
  hostPeer.on('error', e=>{
    document.getElementById('buzzUrl').textContent = 'Connection error: ' + e.type + ' (needs internet)';
  });
}

function renderPlayerList(){
  const el = document.getElementById('playerList');
  el.innerHTML = '';
  buzzConns.forEach(c=>{
    const d = document.createElement('div');
    d.className = 'player-chip';
    d.textContent = c._pname + ' · ' + c._pteam;
    el.appendChild(d);
  });
}

function broadcast(msg){ buzzConns.forEach(c=>{ try{c.send(msg);}catch(e){} }); }

function armBuzzers(){
  if(!buzzConns.length) return;
  buzzWinner = null; buzzArmed = true;
  document.getElementById('buzzBanner').classList.remove('on');
  document.getElementById('rearmBtn').style.display = 'none';
  broadcast({type:'arm'});
}
function resetBuzzers(){
  buzzArmed = false; buzzWinner = null;
  document.getElementById('buzzBanner').classList.remove('on');
  const rb = document.getElementById('rearmBtn');
  if(rb) rb.style.display = 'none';
  broadcast({type:'reset'});
}

// ----- player client -----
let clientConn = null;
function initBuzzerClient(hostId){
  document.getElementById('stage').style.display = 'none';
  document.getElementById('buzzClient').classList.add('active');
  const peer = new Peer();
  peer.on('open', ()=>{
    clientConn = peer.connect(hostId);
    clientConn.on('open', ()=>{
      clientConn.send({type:'hi'});
      // retry if the team list hasn't arrived
      let tries = 0;
      const iv = setInterval(()=>{
        const sel = document.getElementById('playerTeam');
        if(sel.options.length > 0 || ++tries > 5){ clearInterval(iv); return; }
        try{ clientConn.send({type:'hi'}); }catch(e){}
      }, 1200);
    });
    clientConn.on('data', d=>{
      if(d.type === 'hello'){
        const sel = document.getElementById('playerTeam');
        sel.innerHTML = d.teams.map(t=>'<option>'+t.replace(/</g,'&lt;')+'</option>').join('');
      }
      if(d.type === 'arm'){
        document.getElementById('bigBuzz').classList.remove('locked','won');
        document.getElementById('buzzStatus').textContent = 'GO!';
        if(navigator.vibrate) navigator.vibrate(80);
      }
      if(d.type === 'lock'){
        const me = document.getElementById('playerName').value.trim();
        const won = d.winnerName === me;
        const btn = document.getElementById('bigBuzz');
        btn.classList.add(won ? 'won' : 'locked');
        document.getElementById('buzzStatus').textContent =
          won ? 'You buzzed first! Answer!' : d.winnerName + ' buzzed first';
      }
      if(d.type === 'reset'){
        document.getElementById('bigBuzz').classList.add('locked');
        document.getElementById('bigBuzz').classList.remove('won');
        document.getElementById('buzzStatus').textContent = 'Waiting for a clue...';
      }
    });
    clientConn.on('close', ()=>{
      document.getElementById('buzzStatus').textContent = 'Disconnected. Refresh to rejoin.';
    });
  });
  peer.on('error', ()=>{
    document.getElementById('buzzStatus').textContent = 'Could not connect. Refresh to retry.';
  });
}
function joinGame(){
  const name = document.getElementById('playerName').value.trim();
  if(!name || !clientConn) return;
  clientConn.send({type:'join', name, team: document.getElementById('playerTeam').value});
  document.getElementById('joinForm').style.display = 'none';
  document.getElementById('buzzArea').style.display = 'flex';
}
function sendBuzz(){
  if(clientConn){ clientConn.send({type:'buzz'}); if(navigator.vibrate) navigator.vibrate(40); }
}

if(BUZZ_JOIN){ initBuzzerClient(BUZZ_JOIN); }

</script>

          won ? 'You buzzed first! Answer!' : d.winnerName + ' buzzed first';
      }
      if(d.type === 'reset'){
        document.getElementById('bigBuzz').classList.add('locked');
        document.getElementById('bigBuzz').classList.remove('won');
        document.getElementById('buzzStatus').textContent = 'Waiting for a clue...';
      }
    });
    clientConn.on('close', ()=>{
      document.getElementById('buzzStatus').textContent = 'Disconnected. Refresh to rejoin.';
    });
  });
  peer.on('error', ()=>{
    document.getElementById('buzzStatus').textContent = 'Could not connect. Refresh to retry.';
  });
}
function joinGame(){
  const name = document.getElementById('playerName').value.trim();
  if(!name || !clientConn) return;
  clientConn.send({type:'join', name, team: document.getElementById('playerTeam').value});
  document.getElementById('joinForm').style.display = 'none';
  document.getElementById('buzzArea').style.display = 'flex';
}
function sendBuzz(){
  if(clientConn){ clientConn.send({type:'buzz'}); if(navigator.vibrate) navigator.vibrate(40); }
}

if(BUZZ_JOIN){ initBuzzerClient(BUZZ_JOIN); }

</script>

<style>
  :root{
    --abyss:#022B45;      /* darkest ocean */
    --deep:#04395E;       /* deep ocean */
    --ocean:#0A6EBD;      /* mid ocean blue */
    --sky:#7FD4F5;        /* sky blue */
    --seafoam:#8FE3CF;    /* seafoam green */
    --sand:#F2D8A7;       /* sand gold */
    --sandDark:#D9B87C;
    --coral:#FF6F61;      /* coral accent */
    --sunset:#FFB347;     /* sunset orange */
    --pos:#2E9E6B;
    --neg:#D64545;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    background:#01141F;
    color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    overflow:hidden;
    user-select:none;
    display:flex;align-items:center;justify-content:center;
  }

  /* ===== 16:9 STAGE with buffer for TV bars / overscan ===== */
  #stage{
    position:relative;
    aspect-ratio:16/9;
    width:min(92vw, calc(92vh * 16 / 9));
    height:min(92vh, calc(92vw * 9 / 16));
    background:linear-gradient(180deg, var(--deep) 0%, var(--ocean) 130%);
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 0 60px rgba(10,110,189,.45);
  }

  .screen{display:none;position:absolute;inset:0;flex-direction:column;}
  .screen.active{display:flex;}

  /* ---------- SETUP ---------- */
  #setup{align-items:center;justify-content:center;text-align:center;padding:3%;gap:2vmin;}
  .logo{font-size:7.5vmin;font-weight:900;letter-spacing:.04em;line-height:1;
    color:var(--sand);text-shadow:0 .5vmin 0 var(--abyss), 0 1vmin 3vmin rgba(0,0,0,.5);}
  .logo span{color:var(--seafoam);}
  .tagline{color:var(--sky);font-size:2.1vmin;letter-spacing:.3em;text-transform:uppercase;}
  .wave{width:50%;height:1.3vmin;border-radius:99px;
    background:linear-gradient(90deg,var(--seafoam),var(--sky),var(--sand),var(--coral));}
  .setup-row{display:flex;gap:1.5vmin;align-items:center;justify-content:center;flex-wrap:wrap;}
  .setup-label{font-size:2vmin;color:var(--sky);text-transform:uppercase;letter-spacing:.1em;}
  .count-btn{width:6.2vmin;height:6.2vmin;border-radius:1.4vmin;border:.3vmin solid var(--sky);
    background:var(--abyss);color:#fff;font-size:2.8vmin;font-weight:800;cursor:pointer;}
  .count-btn.sel{background:var(--coral);border-color:var(--coral);}
  #teamNames{display:flex;flex-direction:row;gap:1.2vmin;flex-wrap:wrap;justify-content:center;max-width:90%;}
  #teamNames input{padding:1.3vmin 1.5vmin;font-size:2.1vmin;border-radius:1.2vmin;
    border:.3vmin solid var(--sky);background:var(--abyss);color:#fff;text-align:center;
    font-weight:700;width:21vmin;}
  #teamNames input:focus{outline:none;border-color:var(--seafoam);}
  .toggle-row{display:flex;gap:1.2vmin;align-items:center;}
  .toggle{width:8vmin;height:4.2vmin;border-radius:99px;background:var(--abyss);
    border:.3vmin solid var(--sky);position:relative;cursor:pointer;transition:background .2s;}
  .toggle::after{content:'';position:absolute;top:.35vmin;left:.4vmin;width:3vmin;height:3vmin;
    border-radius:50%;background:var(--sky);transition:transform .2s;}
  .toggle.on{background:var(--seafoam);border-color:var(--seafoam);}
  .toggle.on::after{transform:translateX(3.6vmin);background:var(--abyss);}
  .big-btn{padding:1.9vmin 5.5vmin;font-size:2.5vmin;font-weight:900;letter-spacing:.06em;border:none;
    border-radius:1.8vmin;background:linear-gradient(135deg,var(--coral),var(--sunset));color:#fff;
    cursor:pointer;box-shadow:0 .8vmin 2.5vmin rgba(255,111,97,.4);text-transform:uppercase;}
  .big-btn:active{transform:scale(.96);}
  .big-btn:disabled{opacity:.35;pointer-events:none;}

  /* ---------- CATEGORY PICKER ---------- */
  #picker{padding:2% 3% 2% 3%;gap:1.2vmin;}
  #picker .back-btn{position:static;width:6vmin;height:6vmin;font-size:2.6vmin;flex-shrink:0;}
  #picker .picker-head{align-items:center;}
  .picker-head{display:flex;align-items:center;justify-content:space-between;gap:1.5vmin;}
  .picker-title{font-size:2.8vmin;font-weight:900;color:var(--sand);text-transform:uppercase;letter-spacing:.06em;}
  .picker-sub{font-size:1.8vmin;color:var(--sky);}
  .picker-actions{display:flex;gap:1vmin;}
  .small-btn{padding:1.1vmin 2.2vmin;font-size:1.8vmin;font-weight:800;border:none;border-radius:1.1vmin;
    cursor:pointer;color:#fff;text-transform:uppercase;letter-spacing:.04em;background:var(--ocean);}
  .small-btn.go{background:linear-gradient(135deg,var(--coral),var(--sunset));}
  .small-btn:disabled{opacity:.35;pointer-events:none;}
  #catGrid{flex:1;display:grid;grid-template-columns:repeat(6,1fr);grid-auto-rows:minmax(5.5vmin,1fr);gap:.7vmin;min-height:0;overflow-y:auto;}
  .pick{border:none;border-radius:1vmin;background:var(--abyss);color:var(--sky);
    font-size:1.75vmin;font-weight:800;text-transform:uppercase;cursor:pointer;padding:.5vmin;
    line-height:1.15;letter-spacing:.02em;border:.25vmin solid transparent;}
  .pick.sel{background:var(--ocean);color:#fff;border-color:var(--seafoam);}
  .pick.spent{opacity:.25;pointer-events:none;text-decoration:line-through;}

  /* ---------- GAME LAYOUT ---------- */
  #game{padding:1%;}
  #roundTag{text-align:center;font-size:1.7vmin;color:var(--sand);text-transform:uppercase;
    letter-spacing:.25em;font-weight:800;padding-bottom:.5vmin;}
  #board{flex:1;display:grid;grid-template-rows:minmax(0,1.1fr) repeat(5,minmax(0,1fr));
    gap:.6vmin;min-height:0;}
  .cat{background:var(--abyss);border-radius:.9vmin;display:flex;align-items:center;justify-content:center;
    text-align:center;padding:.5vmin .4vmin;font-weight:900;text-transform:uppercase;
    font-size:1.9vmin;line-height:1.15;color:#fff;
    border-bottom:.5vmin solid var(--coral);letter-spacing:.02em;}
  .tile{background:linear-gradient(160deg,var(--ocean),var(--deep));border-radius:.9vmin;border:none;
    color:var(--sand);font-weight:900;font-size:4vmin;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    text-shadow:0 .4vmin .8vmin rgba(0,0,0,.5);transition:transform .1s;}
  .tile:active{transform:scale(.95);}
  .tile.used{background:rgba(1,20,31,.55);color:transparent;pointer-events:none;text-shadow:none;}

  /* ---------- SCOREBAR ---------- */
  #scorebar{display:flex;gap:.6vmin;padding-top:.6vmin;}
  .team{flex:1;background:var(--abyss);border-radius:1vmin;padding:.7vmin .4vmin;text-align:center;
    border-top:.5vmin solid var(--seafoam);}
  .team.t2{border-top-color:var(--sunset);}
  .team.t3{border-top-color:var(--coral);}
  .team.t4{border-top-color:var(--sky);}
  .team .tname{font-size:1.7vmin;font-weight:700;color:var(--sky);
    text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .team .tscore{font-size:3vmin;font-weight:900;color:var(--sand);}
  .team .tscore.negative{color:var(--neg);}
  .adj{display:flex;justify-content:center;gap:1vmin;margin-top:.2vmin;}
  .adj button{width:4vmin;height:3vmin;border-radius:.7vmin;border:none;background:var(--deep);
    color:var(--sky);font-size:2vmin;font-weight:900;cursor:pointer;}

  #nextRoundWrap{padding-top:.6vmin;display:none;gap:.6vmin;}
  #nextRoundWrap.show{display:flex;}
  #nextRoundWrap button{flex:1;padding:1.3vmin;font-size:2vmin;font-weight:900;border:none;
    border-radius:1.2vmin;color:#fff;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;}
  #round2Btn{background:var(--ocean);}
  #finalBtn{background:linear-gradient(135deg,var(--coral),var(--sunset));}

  .back-btn{position:absolute;top:2vmin;left:2vmin;width:7vmin;height:7vmin;border-radius:50%;
    border:.3vmin solid var(--sky);background:rgba(2,43,69,.7);color:var(--sky);
    font-size:3.2vmin;font-weight:900;cursor:pointer;z-index:60;line-height:1;}
  .back-btn:active{transform:scale(.9);}

  /* ---------- CLUE MODAL ---------- */
  #clue{position:absolute;inset:0;background:linear-gradient(180deg,var(--abyss) 0%, var(--deep) 100%);
    display:none;flex-direction:column;align-items:center;justify-content:center;
    padding:5%;text-align:center;gap:2.4vmin;z-index:50;}
  #clue.active{display:flex;}
  #timerRing{position:absolute;top:2.5vmin;right:2.5vmin;width:9vmin;height:9vmin;display:none;
    align-items:center;justify-content:center;border-radius:50%;
    font-size:3.2vmin;font-weight:900;color:var(--sand);
    background:conic-gradient(var(--seafoam) var(--pct,100%), rgba(255,255,255,.12) 0);}
  #timerRing.on{display:flex;}
  #timerRing.warn{background:conic-gradient(var(--coral) var(--pct,100%), rgba(255,255,255,.12) 0);color:#fff;}

<body>
<div id="stage">

  <!-- SETUP -->
  <div id="setup" class="screen active">

    <button class="big-btn" onclick="toPicker()">Pick Categories</button>

  </div>

  <!-- CATEGORY PICKER -->
  <div id="picker" class="screen">
    <div class="picker-head">
      <button class="back-btn" id="pickerBack" onclick="pickerBack()" title="Back">&larr;</button>
      <div>
        <div class="picker-title" id="pickerTitle">Pick Your Categories</div>
        <div class="picker-sub" id="pickerSub">Choose 5 or 6 from the bank of 30</div>

        <button class="small-btn" id="tab1" onclick="setPhase(1)" style="background:var(--coral)">Beach</button>

        <button class="small-btn" onclick="randomPick()">Surprise Me</button>
        <button class="small-btn go" id="startBoardBtn" onclick="startBoard()" disabled>Start (0)</button>
      </div>
    </div>
    <div id="catGrid"></div>
  </div>

  <!-- GAME -->
  <div id="game" class="screen">
    <button id="buzzToggleBtn" onclick="toggleBuzzSetup()" title="Phone buzzers">📱</button>
    <div id="roundTag"></div>
    <div id="board"></div>
    <div id="nextRoundWrap">
      <button id="round2Btn" onclick="startRound2()">Round 2: Double Values</button>
      <button id="finalBtn" onclick="startFinal()">Final Jeopardy</button>
    </div>
    <div id="scorebar"></div>
  </div>

  <!-- CLUE MODAL -->
  <div id="clue">
    <button class="back-btn" onclick="cancelClue()" title="Back to board">&larr;</button>
    <div id="timerRing"><span id="timerNum">30</span></div>
    <div id="ddBanner" class="dd-banner" style="display:none">Daily Double!</div>
    <div id="buzzBanner"></div>
    <div id="clueCat"></div>
    <div id="clueValue"></div>
    <div id="wagerBox" style="display:none">
      <input id="wagerInput" type="number" inputmode="numeric" placeholder="Wager">
      <button class="mbtn reveal" onclick="lockWager()">Lock It In</button>
    </div>
    <div id="clueText" style="display:none"></div>
    <div id="answerText"></div>
    <div class="modal-btns" id="revealBtns" style="display:none">
      <button class="mbtn reveal" onclick="revealAnswer()">Reveal Answer</button>
    </div>
    <div id="awardArea" style="display:none">
      <div class="award-grid" id="awardGrid"></div>
      <div style="height:1.5vmin"></div>
      <button class="mbtn reveal" id="rearmBtn" onclick="armBuzzers()" style="display:none">Re-Arm Buzzers</button>
      <button class="mbtn nobody" onclick="closeClue()">No One Got It</button>
    </div>
  </div>

  <!-- BUZZER HOST OVERLAY -->
  <div id="buzzSetup">
    <h2>Phone Buzzers</h2>
    <div id="qrBox"><div id="qrCode"></div></div>
    <div id="buzzUrl">starting...</div>
    <div style="color:var(--seafoam);font-size:2vmin">Scan with each player's phone camera</div>
    <div id="playerList"></div>
    <button class="mbtn reveal" onclick="toggleBuzzSetup()">Done</button>
  </div>

  <!-- WINNER -->
  <div id="winner">
    <div id="winnerSub">And the champion is</div>
    <div id="winnerName"></div>
    <div class="wave"></div>
    <div id="finalScores"></div>
    <button class="big-btn" onclick="location.reload()">Play Again</button>
  </div>

</div>

<div id="buzzClient">
  <div id="joinForm">
    <div style="font-size:6vmin;font-weight:900;color:var(--sand);margin-bottom:3vmin">Join the Game</div>
    <input id="playerName" placeholder="Your name" maxlength="12"><br><br>
    <select id="playerTeam"></select><br><br>
    <button class="big-btn" style="font-size:5vmin;padding:3vmin 8vmin" onclick="joinGame()">Let's Go</button>
  </div>
  <div id="buzzArea" style="display:none;flex-direction:column;align-items:center;gap:4vmin">
    <div id="buzzStatus">Waiting for a clue...</div>
    <button id="bigBuzz" class="locked" onclick="sendBuzz()">BUZZ</button>
  </div>
</div>

const PHASE2 = new Set(["1990s Movies","1990s Culture","1990s Sports Events","1990s Toys",
"Saturday Morning Cartoons","Gotta Catch 'Em All","2000s Bangers","The Early Internet",
"Blockbuster Nights","Wizarding World","Science","World Geography","Potent Potables","Before & After",
"U.S. Presidents","Shakespeare","Ancient History","Rhyme Time","Body of Knowledge","Potpourri"]);
let pickerPhase = 1;

const VALUES = [200, 400, 600, 800, 1000];
const FINAL = {
  cat: "World Beaches",
  clue: "Home to more than 10,000 beaches, you could visit one on this island continent every day for over 27 years.",
  answer: "What is Australia?"
};

// ================= STATE =================
let teams = [];
let numTeams = 3;
let round = 1;               // 1 = single, 2 = double values
let boardCats = [];          // indices into BANK for current board
let spentCats = new Set();   // categories already played this game
let picked = new Set();      // current picker selection
let tilesLeft = 0;
let dailyDoubles = new Set();
let current = null;
let isFinalRound = false;
let timerOn = false;
let timerId = null;
let usedTiles = new Set();

// ----- auto-save: game survives closing the app mid-game -----
const SAVE_KEY = 'beachJeopardySave';
function saveState(){
  try{
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      teams, round, boardCats,
      spent:[...spentCats], used:[...usedTiles], dd:[...dailyDoubles],
      tilesLeft, timerOn, ts: Date.now()
    }));
  }catch(e){}
}
function clearSave(){ try{ localStorage.removeItem(SAVE_KEY); }catch(e){} }
function loadSave(){
  try{
    const s = JSON.parse(localStorage.getItem(SAVE_KEY));
    if(s && s.teams && s.boardCats && s.boardCats.length) return s;
  }catch(e){}
  return null;
}
function resumeGame(){
  const s = loadSave();
  if(!s) return;
  teams = s.teams; round = s.round; boardCats = s.boardCats;
  spentCats = new Set(s.spent); usedTiles = new Set(s.used);
  dailyDoubles = new Set(s.dd); tilesLeft = s.tilesLeft; timerOn = s.timerOn;
  document.getElementById('roundTag').textContent =
    round === 1 ? 'Round 1' : 'Round 2: Double Values';
  buildBoard();
  usedTiles.forEach(k=>{
    const t = document.getElementById('tile-'+k.replace('-','-'));
    const el = document.getElementById('tile-'+k);
    if(el) el.classList.add('used');
  });
  renderScores();
  if(tilesLeft <= (boardCats.length * 5) - 3){
    document.getElementById('nextRoundWrap').classList.add('show');
    document.getElementById('round2Btn').style.display =
      (round === 1 && BANK.length - spentCats.size >= 5) ? 'block' : 'none';
  } else {
    document.getElementById('nextRoundWrap').classList.remove('show');
  }
  switchScreen('game');
}

// ================= SETUP =================
const namesDiv = document.getElementById('teamNames');
function renderNameInputs(){
  namesDiv.innerHTML = '';
  for(let i=0;i<numTeams;i++){
    const inp = document.createElement('input');
    inp.placeholder = 'Team ' + (i+1);
    inp.maxLength = 14;
    namesDiv.appendChild(inp);
  }
}
document.querySelectorAll('.count-btn').forEach(b=>{
  b.onclick = ()=>{
    document.querySelectorAll('.count-btn').forEach(x=>x.classList.remove('sel'));
    b.classList.add('sel');
    numTeams = +b.dataset.n;
    renderNameInputs();
  };
});
renderNameInputs();
if(loadSave()){ document.getElementById('resumeBtn').style.display = 'block'; }

function toPicker(){
  if(round === 1){
    clearSave();
    usedTiles = new Set();
    teams = [...namesDiv.querySelectorAll('input')].map((inp,i)=>({
      name: inp.value.trim() || ('Team ' + (i+1)),
      score: 0
    }));
    timerOn = document.getElementById('timerToggle').classList.contains('on');
  }
  picked = new Set();
  document.getElementById('pickerTitle').textContent =
    round === 1 ? 'Pick Your Categories' : 'Round 2: Pick Again';
  document.getElementById('pickerSub').textContent =
    'Pick 5 or 6. Beach = classic, Phase 2 = 90s throwbacks & show-style';
  renderPicker();
  switchScreen('picker');
}

function setPhase(p){
  pickerPhase = p;
  document.getElementById('tab1').style.background = p===1 ? 'var(--coral)' : 'var(--ocean)';
  document.getElementById('tab2').style.background = p===2 ? 'var(--coral)' : 'var(--ocean)';
  renderPicker();
}

function catPhase(i){ return PHASE2.has(BANK[i].cat) ? 2 : 1; }

function renderPicker(){
  const grid = document.getElementById('catGrid');
  grid.innerHTML = '';
  BANK.forEach((b,i)=>{
    if(catPhase(i) !== pickerPhase) return;
    const btn = document.createElement('button');
    btn.className = 'pick' + (spentCats.has(i) ? ' spent' : '') + (picked.has(i) ? ' sel' : '');
    btn.textContent = b.cat;
    btn.onclick = ()=>{
      if(picked.has(i)) picked.delete(i);
      else if(picked.size < 6) picked.add(i);
      renderPicker();
    };
    grid.appendChild(btn);
  });
  const go = document.getElementById('startBoardBtn');
  go.textContent = 'Start (' + picked.size + ')';
  go.disabled = !(picked.size === 5 || picked.size === 6);
}

function randomPick(){
  picked = new Set();
  const avail = BANK.map((_,i)=>i).filter(i=>!spentCats.has(i) && catPhase(i)===pickerPhase);
  while(picked.size < Math.min(6, avail.length)){
    picked.add(avail[Math.floor(Math.random()*avail.length)]);
  }
  renderPicker();
}

function startBoard(){
  usedTiles = new Set();
  boardCats = [...picked];
  boardCats.forEach(i=>spentCats.add(i));
  const n = boardCats.length;
  tilesLeft = n * 5;
  // Auto-place daily doubles: 1 in round 1, 2 in round 2 (like the real show),
  // never in the top row.
  dailyDoubles = new Set();
  const ddCount = round === 1 ? 1 : 2;
  while(dailyDoubles.size < ddCount){
    const c = Math.floor(Math.random()*n);
    const r = 1 + Math.floor(Math.random()*4);
    dailyDoubles.add(c + '-' + r);
  }
  document.getElementById('roundTag').textContent =
    round === 1 ? 'Round 1' : 'Round 2: Double Values';
  document.getElementById('nextRoundWrap').classList.remove('show');
  buildBoard();
  renderScores();
  switchScreen('game');
  saveState();
}

function switchScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ================= BOARD =================
function tileValue(r){ return VALUES[r] * (round === 2 ? 2 : 1); }

function buildBoard(){
  const board = document.getElementById('board');
  const n = boardCats.length;
  board.style.gridTemplateColumns = 'repeat(' + n + ',1fr)';
  board.innerHTML = '';
  boardCats.forEach(ci=>{
    const el = document.createElement('div');
    el.className = 'cat';
    el.textContent = BANK[ci].cat;
    board.appendChild(el);
  });
  for(let r=0;r<5;r++){
    for(let c=0;c<n;c++){
      const t = document.createElement('button');
      t.className = 'tile';
      t.id = 'tile-'+c+'-'+r;
      t.textContent = '$' + tileValue(r);
      t.onclick = ()=>openClue(c,r);
      board.appendChild(t);
    }
  }
}

function renderScores(){
  const bar = document.getElementById('scorebar');
  bar.innerHTML = '';
  teams.forEach((t,i)=>{
    const div = document.createElement('div');
    div.className = 'team t'+(i+1);
    div.innerHTML =
      '<div class="tname">'+esc(t.name)+'</div>' +
      '<div class="tscore'+(t.score<0?' negative':'')+'">$'+t.score.toLocaleString()+'</div>' +
      '<div class="adj"><button onclick="bump('+i+',-100)">&minus;</button><button onclick="bump('+i+',100)">+</button></div>';
    bar.appendChild(div);
  });
}
function bump(i,amt){ teams[i].score += amt; renderScores(); saveState(); }
function esc(s){ return s.replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// ================= TIMER (WebAudio beep, no external files) =================
function beep(freq, dur, when){
  try{
    if(!window._actx) window._actx = new (window.AudioContext || window.webkitAudioContext)();
    const ctx = window._actx;
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.frequency.value = freq; o.type = 'sine';
    g.gain.setValueAtTime(.25, ctx.currentTime + when);
    g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + when + dur);
    o.connect(g); g.connect(ctx.destination);
    o.start(ctx.currentTime + when); o.stop(ctx.currentTime + when + dur);
  }catch(e){}
}
function timesUp(){ beep(880,.18,0); beep(660,.18,.2); beep(440,.4,.4); }

function startTimer(){
  if(!timerOn) return;
  stopTimer();
  const ring = document.getElementById('timerRing');
  const num = document.getElementById('timerNum');
  let t = 30;
  ring.classList.add('on');
  ring.classList.remove('warn');
  num.textContent = t;
  ring.style.setProperty('--pct','100%');
  timerId = setInterval(()=>{
    t--;
    if(t < 0){ stopTimer(); timesUp(); return; }
    num.textContent = t;
    ring.style.setProperty('--pct', (t/30*100) + '%');
    if(t <= 5){ ring.classList.add('warn'); beep(880,.08,0); }
  }, 1000);
}
function stopTimer(){
  if(timerId){ clearInterval(timerId); timerId = null; }
}
function hideTimer(){
  stopTimer();
  document.getElementById('timerRing').classList.remove('on');
}

// ================= CLUE FLOW =================
function openClue(c,r){
  const key = c+'-'+r;
  const isDD = dailyDoubles.has(key);
  current = { c, r, value: tileValue(r), isDD, wager: null };
  const ci = boardCats[c];
  const [clueText, answer] = BANK[ci].clues[r];

  document.getElementById('ddBanner').style.display = isDD ? 'block' : 'none';
  document.getElementById('clueCat').textContent = BANK[ci].cat;
  document.getElementById('clueValue').textContent = isDD ? '' : '$' + current.value;
  document.getElementById('answerText').textContent = answer;
  document.getElementById('answerText').classList.remove('shown');
  document.getElementById('awardArea').style.display = 'none';

  const clueEl = document.getElementById('clueText');
  clueEl.textContent = clueText;

  if(isDD){
    clueEl.style.display = 'none';
    document.getElementById('revealBtns').style.display = 'none';
    document.getElementById('wagerBox').style.display = 'flex';
    const maxScore = Math.max(round === 2 ? 2000 : 1000, ...teams.map(t=>t.score));
    document.getElementById('wagerInput').value = '';
    document.getElementById('wagerInput').placeholder = 'Max $' + maxScore.toLocaleString();
  } else {
    clueEl.style.display = 'block';
    document.getElementById('wagerBox').style.display = 'none';
    document.getElementById('revealBtns').style.display = 'flex';
    startTimer();
    armBuzzers();
  }
  document.getElementById('clue').classList.add('active');
}

function lockWager(){
  const v = parseInt(document.getElementById('wagerInput').value, 10);
  const maxScore = Math.max(round === 2 ? 2000 : 1000, ...teams.map(t=>t.score));
  if(isNaN(v) || v < 0){ return; }
  current.wager = Math.min(v, maxScore);
  document.getElementById('wagerBox').style.display = 'none';
  document.getElementById('clueValue').textContent = '$' + current.wager.toLocaleString() + ' on the line';
  document.getElementById('clueText').style.display = 'block';
  document.getElementById('revealBtns').style.display = 'flex';
  startTimer();
  armBuzzers();
}

function revealAnswer(){
  hideTimer();
  document.getElementById('answerText').classList.add('shown');
  document.getElementById('revealBtns').style.display = 'none';
  buildAwardGrid();
  document.getElementById('awardArea').style.display = 'block';
}

function buildAwardGrid(){
  const grid = document.getElementById('awardGrid');
  grid.innerHTML = '';
  teams.forEach((t,i)=>{
    const wrap = document.createElement('div');
    wrap.className = 'award-team';
    wrap.innerHTML =
      '<div class="award-label">'+esc(t.name)+'</div>' +
      '<div class="award-pair">' +
        '<button class="mbtn correct" onclick="award('+i+',1)">&#10003;</button>' +
        '<button class="mbtn wrong" onclick="award('+i+',-1)">&#10007;</button>' +
      '</div>';
    grid.appendChild(wrap);
  });
}

function award(i, sign){
  if(isFinalRound){
    teams[i].score += sign * teams[i].finalWager;
    teams[i].finalDone = true;
    renderScores();
    if(teams.every(t=>t.finalDone)) { showWinner(); }
    return;
  }
  const amt = current.isDD ? current.wager : current.value;
  teams[i].score += sign * amt;
  renderScores();
  saveState();
  if(sign === 1){ closeClue(); }
}

function closeClue(){
  hideTimer();
  resetBuzzers();
  document.getElementById('clue').classList.remove('active');
  if(isFinalRound){ showWinner(); return; }
  if(current){
    const tile = document.getElementById('tile-'+current.c+'-'+current.r);
    if(tile && !tile.classList.contains('used')){
      tile.classList.add('used');
      usedTiles.add(current.c+'-'+current.r);
      tilesLeft--;
    }
    current = null;
    saveState();
  }
  // Show round options once the board is mostly played (or immediately if you
  // want to cut the round short after a few tiles).
  if(tilesLeft <= (boardCats.length * 5) - 3){
    const wrap = document.getElementById('nextRoundWrap');
    wrap.classList.add('show');
    // hide round 2 option if already in round 2 or not enough categories left
    document.getElementById('round2Btn').style.display =
      (round === 1 && BANK.length - spentCats.size >= 5) ? 'block' : 'none';
  }
}

function cancelClue(){
  // Leave the clue without burning the tile or touching scores
  hideTimer();
  resetBuzzers();
  if(isFinalRound){ return; }  // no backing out of Final Jeopardy
  document.getElementById('clue').classList.remove('active');
  current = null;
}

function pickerBack(){
  // Round 1: back to setup. Round 2: back to the (finished) board view.
  if(round === 1){ switchScreen('setup'); }
  else { switchScreen('game'); }
}

// ================= ROUND 2 =================
function startRound2(){
  round = 2;
  toPicker();
}

// ================= FINAL JEOPARDY =================
function startFinal(){
  isFinalRound = true;
  teams.forEach(t=>{ t.finalWager = null; t.finalDone = false; });
  askWager(0);
}

function askWager(i){
  if(i >= teams.length){ showFinalClue(); return; }
  const t = teams[i];
  const max = Math.max(0, t.score);
  const val = window.prompt(t.name + ', Final Jeopardy wager (max $' + max.toLocaleString() + '):', '0');
  let w = parseInt(val, 10);
  if(isNaN(w) || w < 0) w = 0;
  t.finalWager = Math.min(w, max);
  askWager(i+1);
}

function showFinalClue(){
  current = { isDD:false, value:0 };
  hideTimer();
  document.getElementById('ddBanner').style.display = 'none';
  document.getElementById('clueCat').textContent = 'Final Jeopardy: ' + FINAL.cat;
  document.getElementById('clueValue').textContent = '';
  document.getElementById('wagerBox').style.display = 'none';
  const clueEl = document.getElementById('clueText');
  clueEl.textContent = FINAL.clue;
  clueEl.style.display = 'block';
  document.getElementById('answerText').textContent = FINAL.answer;
  document.getElementById('answerText').classList.remove('shown');
  document.getElementById('revealBtns').style.display = 'flex';
  document.getElementById('awardArea').style.display = 'none';
  document.getElementById('clue').classList.add('active');
  startTimer();
}

function showWinner(){
  clearSave();
  hideTimer();
  document.getElementById('clue').classList.remove('active');
  const sorted = [...teams].sort((a,b)=>b.score-a.score);
  document.getElementById('winnerName').textContent = sorted[0].name;
  document.getElementById('finalScores').innerHTML =
    sorted.map(t=>esc(t.name)+': $'+t.score.toLocaleString()).join('<br>');
  document.getElementById('winner').classList.add('active');
}

// ================= PHONE BUZZERS (PeerJS) =================
const BUZZ_JOIN = new URLSearchParams(location.search).get('buzz');
let hostPeer = null, buzzConns = [], buzzArmed = false, buzzWinner = null;

function toggleBuzzSetup(){
  const el = document.getElementById('buzzSetup');
  const opening = !el.classList.contains('active');
  el.classList.toggle('active');
  if(opening && !hostPeer) startHostPeer();
}

function shortId(){
  const c = 'abcdefghjkmnpqrstuvwxyz23456789';
  let s = 'bj';
  for(let i=0;i<5;i++) s += c[Math.floor(Math.random()*c.length)];
  return s;
}

function startHostPeer(){
  const id = shortId();
  hostPeer = new Peer(id);
  hostPeer.on('open', ()=>{
    const url = location.origin + location.pathname + '?buzz=' + id;
    document.getElementById('buzzUrl').textContent = url;
    new QRCode(document.getElementById('qrCode'), {text:url, width:200, height:200});
  });
  hostPeer.on('connection', conn=>{
    // PeerJS race: incoming connections can already be open before the
    // 'open' handler attaches, so send hello both ways and on request.
    const sendHello = ()=>{ try{ conn.send({type:'hello', teams: teams.map(t=>t.name)}); }catch(e){} };
    if(conn.open){ sendHello(); } else { conn.on('open', sendHello); }
    setTimeout(sendHello, 800);  // belt and suspenders
    conn.on('data', d=>{
      if(d.type === 'hi'){ sendHello(); }
      if(d.type === 'join'){
        conn._pname = d.name; conn._pteam = d.team;
        buzzConns.push(conn);
        renderPlayerList();
        conn.send({type: buzzArmed ? 'arm' : 'reset'});
      }
      if(d.type === 'buzz' && buzzArmed && !buzzWinner){
        buzzWinner = {name: conn._pname, team: conn._pteam};
        buzzArmed = false;
        const b = document.getElementById('buzzBanner');
        b.textContent = '🔔 ' + buzzWinner.name + ' — ' + buzzWinner.team;
        b.classList.add('on');
        beep(1200,.15,0); beep(1500,.25,.15);
        broadcast({type:'lock', winnerName: buzzWinner.name});
        document.getElementById('rearmBtn').style.display = '';
      }
    });
    conn.on('close', ()=>{
      buzzConns = buzzConns.filter(c=>c!==conn);
      renderPlayerList();
    });
  });
  hostPeer.on('error', e=>{
    document.getElementById('buzzUrl').textContent = 'Connection error: ' + e.type + ' (needs internet)';
  });
}

function renderPlayerList(){
  const el = document.getElementById('playerList');
  el.innerHTML = '';
  buzzConns.forEach(c=>{
    const d = document.createElement('div');
    d.className = 'player-chip';
    d.textContent = c._pname + ' · ' + c._pteam;
    el.appendChild(d);
  });
}

function broadcast(msg){ buzzConns.forEach(c=>{ try{c.send(msg);}catch(e){} }); }

function armBuzzers(){
  if(!buzzConns.length) return;
  buzzWinner = null; buzzArmed = true;
  document.getElementById('buzzBanner').classList.remove('on');
  document.getElementById('rearmBtn').style.display = 'none';
  broadcast({type:'arm'});
}
function resetBuzzers(){
  buzzArmed = false; buzzWinner = null;
  document.getElementById('buzzBanner').classList.remove('on');
  const rb = document.getElementById('rearmBtn');
  if(rb) rb.style.display = 'none';
  broadcast({type:'reset'});
}

// ----- player client -----
let clientConn = null;
function initBuzzerClient(hostId){
  document.getElementById('stage').style.display = 'none';
  document.getElementById('buzzClient').classList.add('active');
  const peer = new Peer();
  peer.on('open', ()=>{
    clientConn = peer.connect(hostId);
    clientConn.on('open', ()=>{
      clientConn.send({type:'hi'});
      // retry if the team list hasn't arrived
      let tries = 0;
      const iv = setInterval(()=>{
        const sel = document.getElementById('playerTeam');
        if(sel.options.length > 0 || ++tries > 5){ clearInterval(iv); return; }
        try{ clientConn.send({type:'hi'}); }catch(e){}
      }, 1200);
    });
    clientConn.on('data', d=>{
      if(d.type === 'hello'){
        const sel = document.getElementById('playerTeam');
        sel.innerHTML = d.teams.map(t=>'<option>'+t.replace(/</g,'&lt;')+'</option>').join('');
      }
      if(d.type === 'arm'){
        document.getElementById('bigBuzz').classList.remove('locked','won');
        document.getElementById('buzzStatus').textContent = 'GO!';
        if(navigator.vibrate) navigator.vibrate(80);
      }
      if(d.type === 'lock'){
        const me = document.getElementById('playerName').value.trim();
        const won = d.winnerName === me;
        const btn = document.getElementById('bigBuzz');
        btn.classList.add(won ? 'won' : 'locked');
        document.getElementById('buzzStatus').textContent =
          won ? 'You buzzed first! Answer!' : d.winnerName + ' buzzed first';
      }
      if(d.type === 'reset'){
        document.getElementById('bigBuzz').classList.add('locked');
        document.getElementById('bigBuzz').classList.remove('won');
        document.getElementById('buzzStatus').textContent = 'Waiting for a clue...';
      }
    });
    clientConn.on('close', ()=>{
      document.getElementById('buzzStatus').textContent = 'Disconnected. Refresh to rejoin.';
    });
  });
  peer.on('error', ()=>{
    document.getElementById('buzzStatus').textContent = 'Could not connect. Refresh to retry.';
  });
}
function joinGame(){
  const name = document.getElementById('playerName').value.trim();
  if(!name || !clientConn) return;
  clientConn.send({type:'join', name, team: document.getElementById('playerTeam').value});
  document.getElementById('joinForm').style.display = 'none';
  document.getElementById('buzzArea').style.display = 'flex';
}
function sendBuzz(){
  if(clientConn){ clientConn.send({type:'buzz'}); if(navigator.vibrate) navigator.vibrate(40); }
}

if(BUZZ_JOIN){ initBuzzerClient(BUZZ_JOIN); }

</script>
